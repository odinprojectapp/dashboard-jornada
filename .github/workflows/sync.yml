name: Sync SharePoint Dashboard

on:
  schedule:
    - cron: '0 6,14,20 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests openpyxl msal

      - name: Sincronizar datos desde SharePoint
        env:
          SP_URL: ${{ secrets.SP_URL }}
          SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
          SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, json, re, io, tempfile
          from datetime import datetime
          from pathlib import Path
          import requests
          import msal
          import openpyxl

          TENANT_ID     = os.environ["SP_TENANT_ID"]
          CLIENT_ID     = os.environ["SP_CLIENT_ID"]
          CLIENT_SECRET = os.environ["SP_CLIENT_SECRET"]
          SP_HOSTNAME   = "grcsincelejo.sharepoint.com"
          SITE_PATH     = "/sites/BD_DashboardGestion"
          FOLDER_PATH   = "Safety/Jornada laboral"
          LIMITE        = 36000

          # Obtener token via MSAL (client credentials)
          authority = f"https://login.microsoftonline.com/{TENANT_ID}"
          app = msal.ConfidentialClientApplication(CLIENT_ID, authority=authority, client_credential=CLIENT_SECRET)
          scope = ["https://graph.microsoft.com/.default"]
          result = app.acquire_token_for_client(scopes=scope)
          if "access_token" not in result:
              print("ERROR token:", result.get("error_description", result))
              exit(1)
          token = result["access_token"]
          print("Token obtenido OK")

          base = "https://graph.microsoft.com/v1.0"
          hdrs = {"Authorization": "Bearer " + token}

          # Obtener site ID
          site_r = requests.get(f"{base}/sites/{SP_HOSTNAME}:{SITE_PATH}", headers=hdrs)
          site_r.raise_for_status()
          site_id = site_r.json()["id"]
          print("Site ID:", site_id)

          # Listar drives y encontrar el principal
          drives_r = requests.get(f"{base}/sites/{site_id}/drives", headers=hdrs)
          drives_r.raise_for_status()
          drive = drives_r.json()["value"][0]
          drive_id = drive["id"]
          print("Drive:", drive["name"])

          # Navegar carpeta por carpeta para evitar 500 con paths con espacios
          def get_folder_id(drive_id, path_parts):
              current_id = "root"
              for part in path_parts:
                  r = requests.get(f"{base}/drives/{drive_id}/items/{current_id}/children", headers=hdrs)
                  r.raise_for_status()
                  children = r.json().get("value", [])
                  match = next((c for c in children if c["name"].lower() == part.lower()), None)
                  if not match:
                      print(f"Carpeta no encontrada: {part}")
                      print("Carpetas disponibles:", [c["name"] for c in children if c.get("folder")])
                      exit(1)
                  current_id = match["id"]
                  print(f"Carpeta '{part}' -> ID: {current_id[:20]}...")
              return current_id

          path_parts = [p for p in FOLDER_PATH.split("/") if p]
          folder_id = get_folder_id(drive_id, path_parts)
          items_r = requests.get(f"{base}/drives/{drive_id}/items/{folder_id}/children", headers=hdrs)
          items_r.raise_for_status()
          items = items_r.json().get("value", [])
          excels = [i for i in items if i["name"].endswith((".xlsx", ".xls"))]
          print(f"Archivos Excel: {len(excels)}")

          def hora_str(v):
              if v is None: return None
              if hasattr(v, "hour"): return f"{v.hour:02d}:{v.minute:02d}"
              if hasattr(v, "seconds"): t=int(v.total_seconds()); return f"{t//3600:02d}:{(t%3600)//60:02d}"
              m = re.search(r"(\d{1,2}):(\d{2})", str(v))
              return f"{int(m.group(1)):02d}:{int(m.group(2)):02d}" if m else None

          def calc_segs(e, s):
              if not e or not s: return None
              eh,em=map(int,e.split(":")); sh,sm=map(int,s.split(":"))
              d=(sh*3600+sm*60)-(eh*3600+em*60); return d+86400 if d<0 else d

          todos, seen = [], set()
          for item in excels:
              print("Procesando:", item["name"])
              dl = requests.get(item["@microsoft.graph.downloadUrl"])
              dl.raise_for_status()
              wb = openpyxl.load_workbook(io.BytesIO(dl.content), data_only=True)
              ws = wb.active
              # Buscar headers: imprimir primeras 5 filas para diagnostico y encontrar headers
              hdr = {}
              header_row = 2  # Por defecto fila 2 segun indicacion del usuario
              print(f"  Primeras filas del Excel:")
              for row_idx, row in enumerate(ws.iter_rows(min_row=1, max_row=6, values_only=True), 1):
                  non_empty = [str(c).strip() for c in row if c is not None and str(c).strip() != '']
                  print(f"    Fila {row_idx} ({len(non_empty)} cols): {non_empty[:8]}")
                  # La fila de headers es la primera con >= 4 columnas no vacias
                  if len(non_empty) >= 4 and not hdr:
                      hdr = {str(c).strip(): i for i,c in enumerate(row, 1) if c is not None and str(c).strip() != ''}
                      header_row = row_idx
              print(f"  Headers detectados en fila {header_row} ({len(hdr)} cols): {list(hdr.keys())}")
              ok = 0
              for row in ws.iter_rows(min_row=header_row+1, values_only=True):
                  def g(col): idx=hdr.get(col); return row[idx-1] if idx and idx<=len(row) else None
                  ent=hora_str(g("Entr\u00f3")); sal=hora_str(g("Sali\u00f3_3"))
                  if not ent or not sal: continue
                  sg=calc_segs(ent,sal)
                  if not sg or sg<=0: continue
                  fr=g("Fecha")
                  fecha=fr.strftime("%Y-%m-%d") if isinstance(fr,datetime) else (str(fr)[:10] if fr else "")
                  if not fecha: continue
                  nom=f"{str(g('Apellidos') or '').strip()} {str(g('Nombres') or '').strip()}".title().strip()
                  if not nom: continue
                  key=f"{str(g('Identificador') or '')}_{fecha}"
                  if key in seen: continue
                  seen.add(key)
                  anio=fecha[:4]; mn=int(fecha[5:7])
                  ms=["","enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"]
                  todos.append({"nombre":nom,"cc":str(g("Identificador") or "").strip(),"cargo":str(g("Cargo") or "").strip().title(),"agencia":str(g("Grupo") or "").strip().upper(),"fecha":fecha,"anio":anio,"mes":f"{ms[mn]} {anio}","entrada":ent,"salida":sal,"segs":sg})
                  ok+=1
              print(f"  Validos: {ok}")

          if not todos: print("Sin registros validos — no se actualiza data.js"); exit(0)
          n=len(todos); devs=[r for r in todos if r["segs"]>=LIMITE]
          avg=round(sum(r["segs"] for r in todos)/n); h,m,s=avg//3600,(avg%3600)//60,avg%60
          prom=f"{h:02d}:{m:02d}:{s:02d}"; ahora=datetime.now().strftime("%d/%m/%Y %H:%M")
          rangos={"menor_10h":sum(1 for r in todos if r["segs"]<36000),"de_10_12h":sum(1 for r in todos if 36000<=r["segs"]<43200),"de_12_14h":sum(1 for r in todos if 43200<=r["segs"]<50400),"mayor_14h":sum(1 for r in todos if r["segs"]>=50400)}
          cm={}
          for r in todos:
              if r["cargo"] not in cm: cm[r["cargo"]]={"s":0,"c":0,"d":0}
              cm[r["cargo"]]["s"]+=r["segs"]; cm[r["cargo"]]["c"]+=1
              if r["segs"]>=LIMITE: cm[r["cargo"]]["d"]+=1
          por_cargo=[{"cargo":k,"promedio_segs":round(v["s"]/v["c"]),"total":v["c"],"desviados":v["d"]} for k,v in sorted(cm.items())]
          am={}
          for r in todos:
              if r["agencia"] not in am: am[r["agencia"]]={"s":0,"c":0,"d":0}
              am[r["agencia"]]["s"]+=r["segs"]; am[r["agencia"]]["c"]+=1
              if r["segs"]>=LIMITE: am[r["agencia"]]["d"]+=1
          por_agencia=[{"agencia":k,"promedio_segs":round(v["s"]/v["c"]),"total":v["c"],"desviados":v["d"]} for k,v in sorted(am.items())]
          fm={}
          for r in todos:
              if r["fecha"] not in fm: fm[r["fecha"]]={"s":0,"c":0}
              fm[r["fecha"]]["s"]+=r["segs"]; fm[r["fecha"]]["c"]+=1
          tend=[{"fecha":k,"promedio_segs":round(v["s"]/v["c"]),"total":v["c"]} for k,v in sorted(fm.items())]
          js=f'// Auto-generado {ahora}\nconst ULTIMA_ACTUALIZACION="{ahora}";\nconst LIMITE_SIC_HORAS=10;\nconst RESUMEN={json.dumps({"total":n,"desviados":len(devs),"pct_desviacion":round(len(devs)/n*100,1),"promedio_global":prom,"rangos":rangos,"por_cargo":por_cargo,"por_agencia":por_agencia,"tendencia":tend},ensure_ascii=False)};\nconst REGISTROS={json.dumps(todos,ensure_ascii=False,indent=2)};'
          Path("data.js").write_text(js, encoding="utf-8")
          print(f"data.js OK — {n} registros | {len(devs)} desviaciones | Promedio: {prom}")
          PYEOF

      - name: Commit si hay cambios
        run: |
          git config user.name "GRC Sync Bot"
          git config user.email "sync@grc.bot"
          git diff --quiet data.js || (git add data.js && git commit -m "Auto-sync $(date '+%Y-%m-%d %H:%M')" && git push)
